<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>[TÊN DỰ ÁN]</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Stellar SDK qua CDN (UMD build, không cần bundler) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/12.3.0/stellar-sdk.min.js"></script>

  <!-- Freighter API qua CDN → inject window.freighterApi -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/2.0.0/index.min.js"></script>

  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --primary: #4f8cff;
      --text: #e6e9ef;
      --subtext: #9aa3b2;
      --border: #2a2f3a;
      --success: #3ecf8e;
      --error: #ff5c5c;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 21, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 600;
    }

    button {
      background: var(--primary);
      border: none;
      padding: 10px 16px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.88;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--subtext);
      line-height: 1.5;
      margin: 0 0 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      gap: 12px;
    }

    .status-row span:first-child {
      color: var(--subtext);
      white-space: nowrap;
    }

    .wallet-address {
      font-family: monospace;
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      text-align: right;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-disconnected {
      background: rgba(255, 92, 92, 0.12);
      color: var(--error);
    }

    .badge-connected {
      background: rgba(62, 207, 142, 0.12);
      color: var(--success);
    }

    .result-box {
      background: #11141a;
      border: 1px dashed var(--border);
      padding: 14px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      color: var(--subtext);
      min-height: 48px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }

    .result-box.error {
      border-color: rgba(255, 92, 92, 0.4);
      color: var(--error);
    }

    .result-box.success {
      border-color: rgba(62, 207, 142, 0.35);
      color: var(--success);
    }

    .action-btn {
      margin-top: 12px;
      width: 100%;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<header>
  <h1>[TÊN DỰ ÁN]</h1>
  <button id="connectBtn">Kết nối Ví</button>
</header>

<div class="container">

  <div class="card">
    <h2>Chuyển XLM</h2>
    <p>Nhập địa chỉ nhận và số lượng XLM muốn chuyển.</p>
    <input id="transferTo" placeholder="Địa chỉ nhận (G...)" style="width:100%;padding:9px 12px;background:#11141a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:8px;box-sizing:border-box;">
    <input id="transferAmt" placeholder="Số lượng XLM (vd: 10)" type="number" min="0.0000001" step="any" style="width:100%;padding:9px 12px;background:#11141a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:0;box-sizing:border-box;">
    <button class="action-btn" id="actionBtn">
      <span class="spinner" id="spinner"></span>
      Thực hiện hành động
    </button>
  </div>

  <div class="card">
    <h2>Trạng thái ví</h2>
    <div class="status-row">
      <span>Trạng thái:</span>
      <span class="badge badge-disconnected" id="statusBadge">Chưa kết nối</span>
    </div>
    <div class="status-row" style="margin-top: 10px;">
      <span>Địa chỉ:</span>
      <span class="wallet-address" id="walletAddress">—</span>
    </div>
  </div>
  <div class="status-row" style="margin-top: 10px;">
      <span>Địa chỉ:</span>
      <span class="wallet-address" id="walletAddress">—</span>
    </div>
    <div class="status-row" style="margin-top: 10px;">
      <span>Số dư XLM:</span>
      <span class="wallet-address" id="walletBalance">—</span>
    </div>
    <button id="disconnectBtn" style="margin-top: 15px; background: var(--error); width: 100%; display: none;">Ngắt kết nối</button>
  <div class="card">
    <h2>Kết quả giao dịch</h2>
    <div class="result-box" id="txResult">Chưa có giao dịch nào.</div>
  </div>

</div>

<script>
  const NETWORK_PASSPHRASE = "Test SDF Network ; September 2015";
  const HORIZON_URL        = "https://horizon-testnet.stellar.org";

  const connectBtn   = document.getElementById("connectBtn");
  const walletAddrEl = document.getElementById("walletAddress");
  const statusBadge  = document.getElementById("statusBadge");
  const actionBtn    = document.getElementById("actionBtn");
  const spinner      = document.getElementById("spinner");
  const txResult     = document.getElementById("txResult");

  function setResult(text, type = "") {
    txResult.textContent = text;
    txResult.className   = "result-box" + (type ? " " + type : "");
  }

  function setLoading(on) {
    spinner.style.display = on ? "inline-block" : "none";
    actionBtn.disabled    = on;
  }

  function setConnected(address) {
    walletAddrEl.textContent = address;
    statusBadge.textContent  = "Đã kết nối";
    statusBadge.className    = "badge badge-connected";
    connectBtn.textContent   = address.slice(0, 6) + "…" + address.slice(-4);
  }

  async function connectWallet() {
    const api = window.freighterApi;
    if (!api) { alert("Cài Freighter tại: https://www.freighter.app/"); return null; }

    let connected;
    try {
      const res = await api.isConnected();
      connected = (typeof res === "boolean") ? res : res.isConnected;
    } catch(e) { alert("Lỗi Freighter: " + e.message); return null; }

    if (!connected) { alert("Mở Freighter và đăng nhập trước."); return null; }
    try { await api.requestAccess(); } catch(e) { alert("Từ chối kết nối: " + e.message); return null; }

    let address;
    try { address = await api.getPublicKey(); } catch(e) { alert("Không lấy được địa chỉ: " + e.message); return null; }
    if (!address) { alert("Không lấy được địa chỉ ví."); return null; }

    setConnected(address);
    return address;
  }

  connectBtn.addEventListener("click", async () => {
    const addr = await connectWallet();
    if (addr) setResult("✓ Ví đã kết nối:\n" + addr, "success");
  });

  actionBtn.addEventListener("click", async () => {
    const to  = document.getElementById("transferTo").value.trim();
    const amt = document.getElementById("transferAmt").value.trim();

    if (!to || !amt) { setResult("Vui lòng nhập địa chỉ nhận và số lượng.", "error"); return; }
    if (!to.startsWith("G") || to.length !== 56) { setResult("Địa chỉ nhận không hợp lệ — phải bắt đầu bằng G và có 56 ký tự.", "error"); return; }

    const address = await connectWallet();
    if (!address) return;

    setLoading(true);
    setResult("Đang xử lý giao dịch…");

    try {
      const { TransactionBuilder, BASE_FEE, Asset, Operation, Horizon } = StellarSdk;

      const server  = new Horizon.Server(HORIZON_URL);
      const account = await server.loadAccount(address);

      const tx = new TransactionBuilder(account, {
        fee: BASE_FEE,
        networkPassphrase: NETWORK_PASSPHRASE,
      })
        .addOperation(Operation.payment({
          destination: to,
          asset: Asset.native(),
          amount: parseFloat(amt).toFixed(7),
        }))
        .setTimeout(30)
        .build();

      const api = window.freighterApi;
      const signResult = await api.signTransaction(tx.toXDR(), { networkPassphrase: NETWORK_PASSPHRASE });
      const signedXdr  = (typeof signResult === "string") ? signResult : signResult.signedTxXdr;
      const signed     = TransactionBuilder.fromXDR(signedXdr, NETWORK_PASSPHRASE);
      const result     = await server.submitTransaction(signed);

      setResult("✓ Giao dịch thành công!\nHash: " + result.hash, "success");
    } catch(err) {
      console.error(err);
      const detail = err?.response?.data?.extras?.result_codes
        ? JSON.stringify(err.response.data.extras.result_codes)
        : (err.message || err);
      setResult("Lỗi: " + detail, "error");
    } finally {
      setLoading(false);
    }
  });

  // Thêm 2 dòng khai báo này ở đầu script cùng với các element khác
  const walletBalanceEl = document.getElementById("walletBalance");
  const disconnectBtn   = document.getElementById("disconnectBtn");

  // CẬP NHẬT LẠI HÀM connectWallet CỦA BẠN THÀNH NHƯ SAU:
  async function connectWallet() {
    const api = window.freighterApi;
    if (!api) { alert("Cài Freighter tại: https://www.freighter.app/"); return null; }

    let connected;
    try {
      const res = await api.isConnected();
      connected = (typeof res === "boolean") ? res : res.isConnected;
    } catch(e) { alert("Lỗi Freighter: " + e.message); return null; }

    if (!connected) { alert("Mở Freighter và đăng nhập trước."); return null; }
    try { await api.requestAccess(); } catch(e) { alert("Từ chối kết nối: " + e.message); return null; }

    let address;
    try { address = await api.getPublicKey(); } catch(e) { alert("Không lấy được địa chỉ: " + e.message); return null; }
    if (!address) { alert("Không lấy được địa chỉ ví."); return null; }

    setConnected(address);

    // BẮT ĐẦU ĐOẠN THÊM MỚI: Lấy số dư XLM
    try {
      const server = new StellarSdk.Horizon.Server(HORIZON_URL);
      const account = await server.loadAccount(address);
      const nativeBalance = account.balances.find(b => b.asset_type === 'native');
      walletBalanceEl.textContent = nativeBalance ? `${nativeBalance.balance} XLM` : "0 XLM";
    } catch (e) {
      walletBalanceEl.textContent = "Không thể tải số dư";
    }
    
    // Hiện nút ngắt kết nối
    disconnectBtn.style.display = "block";
    
    return address;
  }

  // THÊM SỰ KIỆN NÀY ĐỂ XỬ LÝ NGẮT KẾT NỐI
  disconnectBtn.addEventListener("click", () => {
    walletAddrEl.textContent = "—";
    walletBalanceEl.textContent = "—";
    statusBadge.textContent = "Chưa kết nối";
    statusBadge.className = "badge badge-disconnected";
    connectBtn.textContent = "Kết nối Ví";
    disconnectBtn.style.display = "none";
    setResult("Đã ngắt kết nối ví.");
  });
</script>


</body>
</html>
